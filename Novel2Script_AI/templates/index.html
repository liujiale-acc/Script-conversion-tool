<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI剧本创作专家系统 2.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f0f2f5; }
        body { background: var(--bg); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; color: #333; }
        .app-header { text-align: center; margin-bottom: 30px; }
        .app-header h1 { color: var(--primary); margin-bottom: 5px; }
        .app-header p { color: #7f8c8d; font-size: 0.9em; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; max-width: 1400px; margin: 0 auto; height: 75vh; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .card-header { padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        textarea { flex: 1; padding: 20px; border: none; font-size: 15px; line-height: 1.7; font-family: "SimSun", serif; outline: none; resize: none; background: #fdfdfd; }
        
        .control-panel { max-width: 1400px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .opt-group { display: flex; align-items: center; gap: 15px; }
        
        select { padding: 10px 15px; border-radius: 6px; border: 1px solid #ddd; outline: none; cursor: pointer; }
        button { padding: 12px 30px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-run { background: var(--primary); color: white; }
        .btn-run:hover { background: #1a252f; transform: translateY(-1px); }
        .btn-run:disabled { background: #bdc3c7; }
        .btn-down { background: var(--success); color: white; display: none; }
        
        /* 酷炫的滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <h1>AI 影视剧本全链生产系统</h1>
    <p>深度赋能编剧：从文字解析到角色分析与分镜生成</p>
</div>

<div class="main-grid">
    <!-- 输入区 -->
    <div class="card">
        <div class="card-header">小说正文录入</div>
        <textarea id="novelInput" placeholder="请输入或粘贴小说片段，AI将自动为您分析角色、转换剧本并生成导演分镜提示词..."></textarea>
    </div>

    <!-- 输出区 -->
    <div class="card">
        <div class="card-header">
            <span>智能生产结果（角色/剧本/视觉）</span>
            <span id="statusTag" style="font-size: 0.8em; color: var(--accent);">就绪</span>
        </div>
        <textarea id="scriptOutput" readonly placeholder="生成结果将包含：
1. 角色画像分析
2. 专业剧本格式
3. AI视觉分镜建议"></textarea>
    </div>
</div>

<div class="control-panel">
    <div class="opt-group">
        <span><b>创作风格：</b></span>
        <select id="categorySelect">
            <option value="电影">电影长片</option>
            <option value="短剧">短剧 (高节奏)</option>
            <option value="电视剧">电视剧</option>
            <option value="动漫脚本">动漫脚本</option>
        </select>
        <span style="color: #999; font-size: 0.85em; margin-left: 10px;">由 DeepSeek-V3 提供核心驱动</span>
    </div>
    
    <div class="opt-group">
        <button class="btn-run" id="runBtn" onclick="submitTask()">立即生成专业稿件</button>
        <button class="btn-down" id="downBtn" onclick="location.href='/download'">导出标准 Word 文档</button>
    </div>
</div>

<script>
    async function submitTask() {
        const text = document.getElementById('novelInput').value;
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('statusTag');
        
        if(!text.trim()) return alert("请输入小说内容");

        btn.disabled = true;
        btn.innerText = "AI 正在深度解析中...";
        status.innerText = "处理中...";

        try {
            const res = await fetch('/convert', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text: text, 
                    category: document.getElementById('categorySelect').value
                })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('scriptOutput').value = data.script;
                document.getElementById('downBtn').style.display = "inline-block";
                status.innerText = "生成成功";
            } else {
                alert("转换失败: " + data.msg);
                status.innerText = "失败";
            }
        } catch(e) {
            alert("请求异常，请检查后端运行状态");
            status.innerText = "异常";
        } finally {
            btn.disabled = false;
            btn.innerText = "立即生成专业稿件";
        }
    }
</script>
</body>
</html>
